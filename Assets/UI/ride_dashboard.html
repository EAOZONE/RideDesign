<!DOCTYPE html>
<html>

<head>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

#container{
position:relative;
width:900px;
margin:auto;
}

#map{
width:900px;
}

#overlay{
position:absolute;
top:0;
left:0;
}

.vehicle{
fill:yellow;
stroke:black;
stroke-width:2;
}

.sensor{
fill: #00ffff;
}

</style>

</head>

<body>

<h2>Ride Tracker</h2>

<div id="container">

<img id="map" src="track_map.jpg">

<svg id="overlay" width="823" height="453">

<!-- sensor dots -->

<circle id="Station1" class="sensor" cx="240" cy="445" r="6"/>
<circle id="Station2" class="sensor" cx="380" cy="445" r="6"/>
<circle id="Centry" class="sensor" cx="700" cy="445" r="6"/>
<circle id="Switch1" class="sensor" cx="780" cy="100" r="6"/>
<circle id="Switch2" class="sensor" cx="720" cy="90" r="6"/>
<circle id="Rotate1" class="sensor" cx="530" cy="90" r="6"/>
<circle id="Rotate2" class="sensor" cx="500" cy="110" r="6"/>
<circle id="Basket" class="sensor" cx="450" cy="190" r="6"/>
<circle id="Mid" class="sensor" cx="180" cy="50" r="6"/>
<circle id="Drop1" class="sensor" cx="70" cy="140" r="6"/>
<circle id="Drop2" class="sensor" cx="65" cy="370" r="6"/>


<!-- vehicle -->

<circle id="vehicle" class="vehicle" cx="380" cy="445" r="8"/>

</svg>

</div>

<script src="dashboard.js"></script>

</body>

</html>
